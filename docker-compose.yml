services:
  postgres:
    image: postgres:16-alpine
    container_name: video_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_bot}
      POSTGRES_USER: ${POSTGRES_USER:-video_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_bot} -d ${POSTGRES_DB:-video_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: video_bot_redis
    restart: unless-stopped
    # volatile-lru evicts only keys that have a TTL set, protecting permanent data.
    # allkeys-lru (previous) could evict active video locks and download slot counters.
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build: .
    container_name: video_bot_webhook
    restart: unless-stopped
    env_file: .env
    command: python -m app.bot.main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies:ro
      - ./logs:/app/logs
      # Only used when USE_LOCAL_BOT_API=true (see the telegram-bot-api
      # service below). aiogram's Local Bot API mode downloads files
      # (cookies.txt, proxy list .txt uploads, etc.) by reading the path
      # Telegram returns directly off disk instead of over HTTP — that
      # path only exists inside this shared volume, which the local API
      # server writes to. Without this mount here too, any file upload
      # fails with FileNotFoundError even though the bot itself works fine.
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    networks:
      - internal

  worker:
    build: .
    container_name: video_bot_worker
    restart: unless-stopped
    env_file: .env
    # -B embeds Celery Beat in this same worker process to run the periodic
    # stale-downloads cleanup (app.worker.celery_app's beat_schedule) — no
    # separate scheduler container needed for a single-worker deployment.
    command: celery -A app.worker.celery_app:celery_app worker -B --loglevel=INFO --concurrency=1 --prefetch-multiplier=1 --max-tasks-per-child=20 -Q downloads,celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies:ro
      - ./logs:/app/logs
      # Подпись под видео: правьте ./caption.txt и перезапуск не нужен —
      # текст перечитывается при каждой отправке.
      - ./caption.txt:/app/caption.txt:ro
    networks:
      - internal

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: video_bot_telegram_api
    restart: unless-stopped
    # Opt-in: only needed when USE_LOCAL_BOT_API=true in .env (raises the
    # 50 MB Telegram upload/download limit to 2000 MB). Get TELEGRAM_API_ID
    # and TELEGRAM_API_HASH from https://my.telegram.org/apps, set them in
    # .env, then start this service too:
    #   docker compose --profile local-bot-api up -d
    profiles: ["local-bot-api"]
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    networks:
      - internal

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: video_bot_flaresolverr
    restart: unless-stopped
    # Opt-in: only needed when FLARESOLVERR_URL is set in .env — solves the
    # DDoS-Guard JS challenge on rezka.ag/hdrezka.* with a real headless
    # browser so app.utils.rezka's plain HTTP requests can get past it.
    #   docker compose --profile flaresolverr up -d
    profiles: ["flaresolverr"]
    environment:
      LOG_LEVEL: info
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: video_bot_nginx
    restart: unless-stopped
    # Only needed for webhook mode. Polling mode runs without it:
    #   docker compose up -d            (polling, no nginx)
    #   docker compose --profile webhook up -d   (webhook + nginx)
    profiles: ["webhook"]
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/video-bot.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/www:/var/www/certbot
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  telegram_bot_api_data:

networks:
  internal:
    driver: bridge
